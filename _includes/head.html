{% include base_path %}
{% if site.github.build_revision %}
  {% assign asset_version = site.github.build_revision %}
{% else %}
  {% assign asset_version = site.time | date: '%s' %}
{% endif %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  (function() {
    var root = document.documentElement;
    var storageKey = "theme-preference";
    var storedTheme = null;
    var theme = "light";

    root.className = root.className.replace(/\bno-js\b/g, '') + ' js ';

    try {
      storedTheme = localStorage.getItem(storageKey);
    } catch (error) {
      storedTheme = null;
    }

    if (storedTheme === "light" || storedTheme === "dark") {
      theme = storedTheme;
    } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      theme = "dark";
    }

    root.setAttribute("data-theme", theme);
    root.style.colorScheme = theme;
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css?v={{ asset_version }}">

<meta http-equiv="cleartype" content="on">
