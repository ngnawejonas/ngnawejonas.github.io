# Highlights/News shown on the about page, newest first.
#
# Each entry takes:
#   date  — short label for the left column (leave out if there isn't one)
#   body  — markdown, so links and nested lists work as usual
#   image — file under /images/, shown directly beneath that entry
#   alt   — description of the image for screen readers
#   url   — optional, makes the image click through

- date: "Jan 2026"
  body: >
    Our work [Robust Fine-Tuning with Epsilon-Scheduling](https://openreview.net/forum?id=aIBFTh2ThF)
    is accepted at ICLR 2026!

- date: "Dec 2025"
  body: |
    Presented two papers at the [Reliable ML workshop at NeurIPS 2025](https://reliablemlworkshop.github.io/):

    - [Robust Fine-Tuning from Non-Robust Pretrained Models: Mitigating Suboptimal Transfer With Adversarial Scheduling](https://arxiv.org/abs/2509.23325)
    - [A Guide to Robust Generalization: The Impact of Architecture, Pre-training, and Optimization Strategy](https://arxiv.org/abs/2508.14079)

- date: "Sep 2025"
  body: >
    Excited to join Stanford University this Fall 2025 as a
    [Visiting Student Researcher](https://profiles.stanford.edu/jonas-ngnawe)
    at the STAIR Lab led by [Prof. Sanmi Koyejo](https://cs.stanford.edu/~sanmi/)!

- date: "Jul 2025"
  body: >
    Attending [DLRL 2025](https://dlrl.ca/), the Deep Learning & Reinforcement Learning
    Summer School in Edmonton!

